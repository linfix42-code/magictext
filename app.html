<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeMagic | Premium Text Stylizer</title>
    <style>
        /* --- Головна колірна палітра та змінні --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            --panel-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent: #4c51bf;
            --accent-hover: #434190;
            --border-color: #e2e8f0;
            --vip-color: #d69e2e;
            --vip-bg: #fefcbf;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
            --modal-overlay: rgba(0, 0, 0, 0.5);
        }

        body.dark-theme {
            --bg-gradient: linear-gradient(135deg, #1a202c 0%, #0d1117 100%);
            --panel-bg: #1a202c;
            --text-main: #edf2f7;
            --text-muted: #a0aec0;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border-color: #2d3748;
            --shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Контейнер додатка --- */
        .app-container {
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }

        /* --- Шапка сайту --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px 0;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, var(--accent), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-toggle, .btn-vip-status {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow);
        }

        .btn-vip-status.active {
            background: var(--vip-bg);
            color: #744210;
            border-color: var(--vip-color);
        }

        /* --- Робоча панель введення --- */
        .input-panel {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .input-panel label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: transparent;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            font-size: 18px;
            color: var(--text-main);
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        /* --- Список результатів --- */
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card-font {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 18px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .font-info {
            flex: 1;
            padding-right: 20px;
        }

        .font-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .font-badge-vip {
            background: var(--vip-bg);
            color: #744210;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
        }

        .font-output {
            font-size: 20px;
            color: var(--text-main);
            word-break: break-all;
            min-height: 28px;
        }

        .btn-copy {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-copy:hover {
            background: var(--accent-hover);
        }

        /* Ефект для заблокованого VIP */
        .card-font.vip-locked .font-output {
            filter: blur(4px);
            user-select: none;
        }

        .card-font.vip-locked .btn-copy {
            background: var(--vip-color);
        }

        /* --- Модальне вікно активації --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .modal p {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .promo-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .promo-input-group input {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: transparent;
            color: var(--text-main);
            font-size: 16px;
            text-transform: uppercase;
            outline: none;
        }

        .promo-input-group input:focus {
            border-color: var(--vip-color);
        }

        .btn-activate {
            background: var(--vip-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .payment-box {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            margin-top: 10px;
        }

        .btn-telegram {
            background: #0088cc;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .btn-close-modal {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo">👑 TypeMagic Premium</div>
            <div class="controls">
                <button class="btn-vip-status" id="vipStatusBtn" onclick="openVipModal()">
                    <span id="vipStatusText">🔒 Активувати VIP</span>
                </button>
                <button class="btn-toggle" onclick="toggleTheme()">🌓 Тема</button>
            </div>
        </header>

        <div class="input-panel">
            <label for="textInput">Введіть ваш текст сюди:</label>
            <textarea id="textInput" placeholder="Напишіть щось цікаве..." oninput="processText()">Hello World</textarea>
        </div>

        <div class="results-list" id="resultsList">
            </div>
    </div>

    <div class="modal-overlay" id="vipModal">
        <div class="modal">
            <h2>👑 Відкрити VIP Версію</h2>
            <p>Отримайте доступ до унікальних рукописних, зациклених та дизайнерських VIP-шрифтів без обмежень!</p>
            
            <div class="promo-input-group">
                <input type="text" id="promoCodeField" placeholder="Введіть промокод (напр. VIP2026)">
                <button class="btn-activate" onclick="checkPromoCode()">ОК</button>
            </div>

            <div class="payment-box">
                <p style="font-size: 13px; margin-bottom: 10px;">Немає промокоду? Отримайте його автоматично через нашого Telegram-бота (Оплата картками ПриватБанк / LiqPay):</p>
                <a href="https://t.me/ТвійБотПлатіжка" target="_blank" class="btn-telegram">
                    💬 Отримати код в Telegram
                </a>
            </div>

            <button class="btn-close-modal" onclick="closeVipModal()">Скасувати</button>
        </div>
    </div>

    <script>
        // --- Алфавіти для трансформації ---
        const normalChars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        
        const fontStyles = [
            { id: "bold", name: "Жирний Математичний", vip: false, map: "𝐚𝐛𝐜𝐝𝐞𝐟𝐠𝐡𝐢𝐣𝐤𝐥𝐦𝐧𝐨𝐩𝐪𝐫𝐬𝐭𝐮𝐯𝐰𝐱𝐲𝐳𝐀𝐁𝐂𝐃𝐄𝐅𝐆𝐇𝐈𝐉𝐊𝐋𝐌𝐍𝐎𝐏𝐐𝐑𝐒𝐓𝐔𝐕𝐖𝐗𝐘𝟗𝟎𝟏𝟐𝟑𝟒𝟓𝟔𝟕𝟖𝟗" },
            { id: "gothic", name: "Середньовічний Готичний", vip: false, map: "𝔞𝔟𝔠𝔡𝔢𝔣𝔤𝔥𝔦𝔟𝔨𝔩𝔪𝔫𝔬𝔭𝔮𝔯𝔰𝔱𝔲𝔳𝔴𝔵𝔶𝔷𝔄𝔅𝔆𝔇𝔈𝔉𝔊𝔏𝔐𝔍𝔚𝔏𝔐𝔑𝔒𝔓𝔔𝔛𝔜𝔚𝔛𝔜𝔝0123456789" },
            { id: "doubleStruck", name: "Подвійні Лінії (Blackboard)", vip: false, map: "𝕒𝕓𝕔𝕕𝕖𝕗𝕘𝕙𝕚𝕛𝕜𝕝𝕞𝕟𝕠𝕡𝕢𝕣𝕤𝕥𝕦𝕧𝕨𝕩𝕪𝕫𝔸𝔹ℂresource𝔻𝔼𝔽𝔾ℍ𝕀𝕁𝕂𝕃𝕄ℕ𝕆ℙℚℝ𝕊𝕋𝕌𝕍𝕎𝕏𝕐ℤ0123456789" },
            // VIP Шрифти
            { id: "script", name: "👑 Елегантний Рукописний VIP", vip: true, map: "𝓪𝓫𝓬𝓭𝓮𝓯𝓰𝓱𝓲𝓳𝓴𝓵𝓶𝓷𝓸𝓹𝓺𝓻𝓼𝓽𝓾𝓿𝔀𝔁𝔂𝔃𝓐𝓑𝓒𝓓𝓔𝓕𝓖𝓗𝓘𝓙𝓚𝓛𝓜𝓝𝓞𝓟𝓠𝓡𝓢𝓣𝓤𝓥𝓦BY𝓩0123456789" },
            { id: "circles", name: "👑 Стильні Кружечки VIP", vip: true, map: "ⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩⒶⒷⒸⒹⒺⒻ𝔾ℍ𝕀𝕁𝕂𝕃𝕄ℕ𝕆ℙℚℝ𝕊𝕋𝕌𝕍𝕎𝕏𝕐ℤ0123456789" },
            { id: "squares", name: "👑 Квадратні Блоки VIP", vip: true, map: "🄰🄱🄲🄳🄴🄵🄶🄷🄹🄺🄻🄼🄽🄾🄿🅀🅁🅂🅃🅄🅅🅆🅇🅈🅉🄰🄱🄲🄳🄴🄵🄶🄷🄹🄺🄻🄼🄽🄾🄿🅀🅁🅂🅃🅄🅅🅆🅇🅈🅉0123456789" }
        ];

        let isVipUnlocked = localStorage.getItem('vip_unlocked') === 'true';

        // --- Ініціалізація сторінки ---
        window.onload = function() {
            if(localStorage.getItem('dark_mode') === 'true') {
                document.body.classList.add('dark-theme');
            }
            updateVipInterfaceState();
            processText();
        }

        // --- Головна логіка трансформації тексту ---
        function transformText(text, mapString) {
            const normalArray = Array.from(normalChars);
            const mapArray = Array.from(mapString);
            
            return Array.from(text).map(char => {
                const idx = normalArray.indexOf(char);
                return idx !== -1 && mapArray[idx] ? mapArray[idx] : char;
            }).join('');
        }

        function processText() {
            const input = document.getElementById('textInput').value || " ";
            const container = document.getElementById('resultsList');
            container.innerHTML = "";

            fontStyles.forEach(style => {
                const transformed = transformText(input, style.map);
                const isLocked = style.vip && !isVipUnlocked;

                const card = document.createElement('div');
                card.className = `card-font ${isLocked ? 'vip-locked' : ''}`;
                
                card.innerHTML = `
                    <div class="font-info">
                        <div class="font-name">
                            ${style.name} 
                            ${style.vip ? `<span class="font-badge-vip">VIP</span>` : ''}
                        </div>
                        <div class="font-output" id="output-${style.id}">${transformed}</div>
                    </div>
                    <button class="btn-copy" onclick="handleCopy('${style.id}', ${style.vip})">
                        ${isLocked ? '🔒 Відкрити' : '📋 Копіювати'}
                    </button>
                `;
                container.appendChild(card);
            });
        }

        // --- Система Кліків та Копіювання ---
        function handleCopy(styleId, isVip) {
            if (isVip && !isVipUnlocked) {
                openVipModal();
                return;
            }

            const textToCopy = document.getElementById(`output-${styleId}`).innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("✨ Стилізований текст успішно скопійовано!");
            });
        }

        // --- Перевірка Промокоду ---
        function checkPromoCode() {
            const code = document.getElementById('promoCodeField').value.trim().toUpperCase();
            
            if (code === "VIP2026") {
                isVipUnlocked = true;
                localStorage.setItem('vip_unlocked', 'true');
                alert("🎉 Преміум Активовано! Усі VIP шрифти розблоковані назавжди.");
                closeVipModal();
                updateVipInterfaceState();
                processText();
            } else {
                alert("❌ Неправильний промокод. Спробуйте ще раз або отримайте робочий код в боті.");
            }
        }

        // --- Перемикачі інтерфейсу ---
        function updateVipInterfaceState() {
            const btnText = document.getElementById('vipStatusText');
            const btnBtn = document.getElementById('vipStatusBtn');
            if (isVipUnlocked) {
                btnText.innerText = "✨ Преміум Активний";
                btnBtn.classList.add('active');
                btnBtn.onclick = null; // Вимикаємо клік якщо активовано
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('dark_mode', document.body.classList.contains('dark-theme'));
        }

        function openVipModal() {
            if (!isVipUnlocked) document.getElementById('vipModal').classList.add('active');
        }

        function closeVipModal() {
            document.getElementById('vipModal').classList.remove('active');
        }
    </script>
</body>
</html>
