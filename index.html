<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стилізатор Тексту Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h2 title="Натисніть 5 разів для режиму розробника">Стилізатор Тексту</h2>
    
    <input type="text" id="userInput" placeholder="Введіть текст (латиницею)..." value="Cool Nickname">

    <select id="fontSelector">
        <optgroup label="Безкоштовні стилі">
            <option value="normal">Звичайний</option>
            <option value="bold">Жирний (Bold)</option>
            <option value="italic">Курсив (Italic)</option>
            <option value="bold_italic">Жирний Курсив</option>
            <option value="monospace">Друкарська машинка</option>
            <option value="bubble">Бульбашки (Bubble)</option>
        </optgroup>
        <optgroup label="Premium Стилі 👑">
            <option value="premium_script">👑 Рукописний (Script)</option>
            <option value="premium_script_bold">👑 Жирний Рукопис</option>
            <option value="premium_gothic">👑 Готичний (Gothic)</option>
            <option value="premium_double">👑 Подвійний (Double)</option>
            <option value="premium_circles">👑 Чорні кола</option>
            <option value="premium_squares">👑 Квадрати</option>
            <option value="premium_smallcaps">👑 Малі заголовні</option>
            <option value="premium_medieval">👑 Середньовічний</option>
        </optgroup>
    </select>

    <div class="premium-row" onclick="location.href='payment.html'">
        <span>👑 Отримати доступ до всіх стилів</span>
    </div>

    <div class="result-box" id="resultDisplay">Cool Nickname</div>

    <button class="copy-btn" id="copyBtn" onclick="copyText()">Скопіювати для соцмереж</button>
</div>

<script src="js/script.js"></script>
</body>
</html>
