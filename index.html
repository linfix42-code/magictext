<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стилізатор Тексту</title>
    <!-- Шрифти -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Roboto:wght@400;700&family=Pacifico&family=Caveat:wght@700&family=Lobster&display=swap" rel="stylesheet">
    
    <!-- Підключаємо твій CSS з папки css -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h2>Стилізатор Тексту</h2>
    
    <input type="text" id="userInput" placeholder="Введіть текст..." value="Hello World">

    <select id="fontSelector">
        <option value="'Roboto', sans-serif">Звичайний шрифт</option>
        <option value="'Dancing Script', cursive">Рукописний (Script)</option>
        <option value="'Pacifico', cursive">Грайливий (Pacifico)</option>
        <option value="'Caveat', cursive">Швидкий запис (Caveat)</option>
        <option value="'Lobster', cursive">Ретро стиль (Lobster)</option>
    </select>

    <!-- Твоя преміум-строчка -->
    <div class="premium-row" onclick="location.href='payment.html'">
        <span>👑 AI Pro Style (Premium)</span>
    </div>

    <div class="result-box" id="resultDisplay">Hello World</div>

    <button class="copy-btn" onclick="copyText()">Скопіювати</button>
</div>

<!-- Підключаємо твій JS з папки js -->
<script src="js/script.js"></script>

</body>
</html>
