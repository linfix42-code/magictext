<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стилізатор Тексту Pro</title>
    <!-- Підключення шрифтів -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Roboto:wght@400;700&family=Pacifico&family=Lobster&family=Monoton&family=Caveat:wght@700&display=swap" rel="stylesheet">
    
    <!-- Шлях до стилів -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h2 title="Натисніть 5 разів для режиму розробника">Стилізатор Тексту</h2>
    
    <input type="text" id="userInput" placeholder="Введіть текст..." value="Hello World">

    <!-- Оновлений блок ШІ-помічника з перемикачем -->
    <div class="ai-assistant" id="aiAssistantBlock">
        <div class="ai-header">
            <div class="ai-status">✨ ШІ аналізує текст...</div>
            <label class="switch">
                <input type="checkbox" id="aiToggle" checked>
                <span class="slider round"></span>
            </label>
        </div>
        <div id="aiSuggestion" class="ai-suggestion">Чекаю на ваш текст...</div>
    </div>

    <select id="fontSelector">
        <option value="'Roboto', sans-serif">Звичайний шрифт</option>
        <option value="'Dancing Script', cursive">Рукописний (Script)</option>
        <option value="'Pacifico', cursive">Грайливий (Pacifico)</option>
        <option value="'Lobster', cursive">Ретро стиль (Lobster)</option>
        <option value="'Caveat', cursive">👑 Елегантний (Premium)</option>
        <option value="'Monoton', cursive">👑 Неоновий (Premium)</option>
    </select>

    <div class="premium-row" onclick="location.href='payment.html'">
        <span>👑 Отримати повний доступ</span>
    </div>

    <div class="result-box" id="resultDisplay">Hello World</div>

    <button class="copy-btn" onclick="copyText()">Скопіювати</button>
</div>

<!-- Шлях до скриптів -->
<script src="js/script.js"></script>

</body>
</html>
