<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Stylizer | Головне Меню</title>
    <style>
        body { 
            background-color: #eef9f6; 
            color: #333; 
            font-family: 'Arial', sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .menu-container { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(26, 188, 156, 0.1); 
            border: 1px solid #e2f4f0; 
            text-align: center; 
            max-width: 500px; 
            width: 100%; 
            box-sizing: border-box;
        }
        .logo-box {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .logo-icon { 
            background: #1abc9c; 
            color: white; 
            padding: 10px 18px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 24px;
        }
        .logo-text { 
            font-size: 28px; 
            font-weight: bold; 
            color: #2c3e50; 
        }
        h1 { 
            font-size: 22px; 
            color: #7f8c8d; 
            margin-top: 0; 
            margin-bottom: 30px; 
            font-weight: normal;
        }
        .menu-buttons { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .btn { 
            display: block; 
            text-decoration: none; 
            padding: 16px 20px; 
            border-radius: 14px; 
            font-size: 18px; 
            font-weight: bold; 
            transition: all 0.2s ease; 
            box-sizing: border-box;
        }
        .btn-start { 
            background: #1abc9c; 
            color: white; 
            border: 2px solid #1abc9c;
        }
        .btn-start:hover { 
            background: #1ea085; 
            border-color: #1ea085;
            transform: translateY(-2px);
        }
        .btn-pro { 
            background: #fff; 
            color: #e74c3c; 
            border: 2px solid #fadbd8; 
        }
        .btn-pro:hover { 
            background: #fdf2e9; 
            border-color: #e74c3c;
            transform: translateY(-2px);
        }
        .footer-text {
            margin-top: 35px;
            font-size: 13px;
            color: #b3c3c7;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <div class="logo-box">
            <span class="logo-icon">T</span>
            <span class="logo-text">Text Stylizer</span>
        </div>
        
        <h1>Перетвори свій текст на унікальний стиль для соцмереж</h1>

        <div class="menu-buttons">
            <a href="app.html" class="btn btn-start">🚀 Запустити Генератор</a>
            <a href="https://t.me/ТвійБотПлатіжка" target="_blank" class="btn btn-pro">👑 Отримати PRO доступ</a>
        </div>

        <div class="footer-text">
            © 2026 Text Stylizer. All rights reserved.
        </div>
    </div>

</body>
</html>
