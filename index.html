<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стилізатор Тексту</title>
    <!-- Підключаємо багато різних шрифтів, щоб було з чого обрати -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Roboto:wght@400;700&family=Playfair+Display:ital,wght@1,700&family=Pacifico&family=Caveat:wght@700&family=Lobster&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 450px; /* Трохи розширив для краси */
            text-align: center;
        }

        h2 {
            color: #2d3748;
            font-size: 24px;
            margin-bottom: 25px;
        }

        input, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px; /* Рівномірні відступи */
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            background-color: #fff;
        }

        /* Золотиста строчка Premium */
        .premium-row {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px dashed #f59e0b;
            border-radius: 12px;
            background-color: #fffaf0;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .premium-row:hover {
            background-color: #fef3c7;
        }

        .premium-row span {
            color: #d97706;
            font-weight: bold;
            font-size: 15px;
        }

        /* Поле результату як на макеті */
        .result-box {
            width: 100%;
            padding: 30px 15px;
            border: 2px solid #7c3aed; /* Насичений фіолетовий */
            border-radius: 18px;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            background: #fff;
            color: #1a202c;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .copy-btn {
            width: 100%;
            padding: 16px;
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .copy-btn:hover {
            background-color: #4f46e5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Стилізатор Тексту</h2>
    
    <input type="text" id="userInput" placeholder="Введіть текст..." value="Hello World">

    <select id="fontSelector">
        <option value="'Roboto', sans-serif">Звичайний шрифт</option>
        <option value="'Dancing Script', cursive">Рукописний (Script)</option>
        <option value="'Pacifico', cursive">Грайливий (Pacifico)</option>
        <option value="'Caveat', cursive">Швидкий запис (Caveat)</option>
        <option value="'Lobster', cursive">Ретро стиль (Lobster)</option>
        <option value="'Playfair Display', serif">Елегантний (Serif)</option>
        <option value="monospace">Системний (Mono)</option>
    </select>

    <div class="premium-row" onclick="location.href='payment.html'">
        <span>👑 AI Pro Style (Premium)</span>
    </div>

    <div class="result-box" id="resultDisplay">Hello World</div>

    <button class="copy-btn" onclick="copyText()">Скопіювати</button>
</div>

<script>
    const input = document.getElementById('userInput');
    const selector = document.getElementById('fontSelector');
    const display = document.getElementById('resultDisplay');

    function refresh() {
        // Оновлюємо текст
        display.textContent = input.value || "Введіть текст...";
        
        // Оновлюємо шрифт (головне виправлення)
        const font = selector.value;
        display.style.fontFamily = font;
    }

    // Слухаємо кожну дію користувача
    input.addEventListener('input', refresh);
    selector.addEventListener('change', refresh);

    function copyText() {
        navigator.clipboard.writeText(display.textContent).then(() => {
            alert('Скопійовано!');
        });
    }

    // Запуск при старті, щоб шрифт підтягнувся відразу
    window.onload = refresh;
</script>

</body>
</html>
