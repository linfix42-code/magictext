<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стилізатор Тексту Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 420px;
            text-align: center;
        }

        h2 {
            color: #1e293b;
            margin-bottom: 25px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        /* Окремий рядок для Premium */
        .premium-box {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #fffaf0; /* Легкий золотистий фон */
            border: 1px dashed #d97706;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .premium-box:hover {
            background-color: #fef3c7;
            transform: scale(1.02);
        }

        .premium-box span {
            color: #d97706;
            font-weight: bold;
            font-size: 15px;
        }

        .result-box {
            margin-top: 20px;
            padding: 25px;
            border: 2px solid #6366f1;
            border-radius: 15px;
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            background: #fff;
        }

        .copy-btn {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Стилізатор Тексту</h2>
    
    <!-- Поле введення тексту -->
    <input type="text" id="userInput" placeholder="Введіть текст..." value="Hello World">

    <!-- Вибір звичайних шрифтів -->
    <select id="fontSelector">
        <option value="'Roboto', sans-serif">Звичайний шрифт</option>
        <option value="'Dancing Script', cursive">Рукописний (Script)</option>
        <option value="serif">Класичний (Serif)</option>
    </select>

    <!-- Окремий рядок Premium під вибором шрифтів -->
    <div class="premium-box" onclick="goToPayment()">
        <span>👑 AI Pro Style (Premium)</span>
    </div>

    <!-- Результат -->
    <div class="result-box" id="resultDisplay">Hello World</div>

    <button class="copy-btn" onclick="copyText()">Скопіювати</button>
</div>

<script>
    const userInput = document.getElementById('userInput');
    const fontSelector = document.getElementById('fontSelector');
    const resultDisplay = document.getElementById('resultDisplay');

    // Оновлення тексту та шрифту
    function update() {
        resultDisplay.textContent = userInput.value;
        resultDisplay.style.fontFamily = fontSelector.value;
    }

    userInput.addEventListener('input', update);
    fontSelector.addEventListener('change', update);

    // Функція переходу до оплати при натисканні на преміум-строчку
    function goToPayment() {
        window.location.href = 'payment.html';
    }

    function copyText() {
        navigator.clipboard.writeText(resultDisplay.textContent).then(() => {
            alert('Текст скопійовано!');
        });
    }
</script>

</body>
</html>
