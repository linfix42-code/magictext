<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextStylizer | Make Your Text POP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- Головна колірна палітра та змінні --- */
        :root {
            --primary-teal: #14b8a6; /* Головний бірюзовий колір кнопок та лого */
            --primary-teal-hover: #0d9488;
            --dark-teal-text: #0a4c46; /* Темний колір для заголовків */
            --light-gray-text: #6b7280; /* Колір підзаголовків */
            --light-teal-bg: #c9f5f0; /* Легкий бірюзовий для градієнта фону */
            --font-family: 'Poppins', sans-serif;
        }

        /* --- Базові налаштування --- */
        body, h1, h2, p, a, button { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, var(--light-teal-bg) 0%, #ffffff 100%);
            min-height: 100vh;
            color: var(--dark-teal-text);
            display: flex;
            flex-direction: column;
        }

        /* --- Панель навігації (Header) --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-teal);
            text-decoration: none;
        }

        /* Плейсхолдер для іконки логотипу */
        .logo-icon { margin-right: 10px; font-size: 24px; }

        .btn-launch {
            background-color: var(--primary-teal);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 50px; /* Дуже округлі кнопки */
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(20, 184, 166, 0.2);
        }

        .btn-launch:hover { background-color: var(--primary-teal-hover); }
        .btn-launch:active { transform: translateY(1px); }
        .btn-icon-nav { margin-left: 8px; font-size: 16px; }

        /* --- Головна секція (Main/Hero) --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .masks-emoji { font-size: 40px; margin-bottom: 20px; }

        .hero h1 {
            font-size: 52px;
            font-weight: 800;
            color: var(--dark-teal-text);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.1;
        }

        /* Стилізація слова POP */
        .hero h1 .pop-text { color: var(--primary-teal); }
        
        /* Зірочки навколо заголовка */
        .sparkle-icon { margin: 0 15px; font-size: 36px; }

        .hero h2 {
            font-size: 18px;
            font-weight: 400;
            color: var(--light-gray-text);
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.5;
        }

        /* --- Кнопки Hero секції --- */
        .hero-btns { display: flex; gap: 15px; margin-bottom: 60px; }
        
        .btn-hero {
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        .btn-start {
            background-color: var(--primary-teal);
            color: white;
            box-shadow: 0 6px 12px rgba(20, 184, 166, 0.3);
        }
        .btn-start:hover { background-color: var(--primary-teal-hover); transform: translateY(-2px); }

        .btn-examples {
            background-color: rgba(255, 255, 255, 0.4);
            border: 2px solid var(--primary-teal);
            color: var(--primary-teal);
        }
        .btn-examples:hover { background-color: rgba(20, 184, 166, 0.05); transform: translateY(-2px); }
        
        .btn-icon-hero { margin-left: 8px; font-size: 18px; }

        /* --- Картка швидкого перегляду (Live Magic Preview) --- */
        .preview-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.06); /* Легка тінь */
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(20, 184, 166, 0.1);
        }

        .card-header {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-teal);
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .card-sparkle { margin: 0 8px; font-size: 14px; }

        /* Сітка з прикладами текстів */
        .text-rows {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            margin-bottom: 25px;
            text-align: center;
        }

        .text-row { font-size: 18px; color: #1f2937; line-height: 1.3; }

        /* Стилізація прикладів Юнікод-шрифтів */
        .row-italic { font-family: serif; font-style: italic; }
        .row-bold { font-weight: bold; }
        .row-inverted { font-family: 'Courier New', monospace; font-weight: bold; color: #fff; background: #000; padding: 2px 6px; border-radius: 4px; }

        /* Футер картки */
        .card-footer { font-size: 14px; color: var(--light-gray-text); font-weight: 400; }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">
            <span class="logo-icon">💠</span>
            TextStylizer
        </a>
        <a href="app.html" class="btn-launch">
            Launch Generator
            <span class="btn-icon-nav">💠</span>
        </a>
    </header>

    <main class="main">
        <div class="masks-emoji">🎭</div>
        
        <div class="hero">
            <h1>
                <span class="sparkle-icon">✨</span>
                Make Your Text <span class="pop-text">POP</span>
                <span class="sparkle-icon">✨</span>
            </h1>
            <h2>Turn boring text into fancy fonts and emoji art</h2>
            
            <div class="hero-btns">
                <a href="app.html" class="btn-hero btn-start">
                    Start Styling Now
                    <span class="btn-icon-hero">🚀</span>
                </a>
                <a href="app.html" class="btn-hero btn-examples">
                    See Examples
                    <span class="btn-icon-hero">#️</span>
                </a>
            </div>
        </div>

        <div class="preview-card">
            <div class="card-header">
                <span class="card-sparkle">✨</span>
                Live Magic Preview
                <span class="card-sparkle">✨</span>
            </div>
            
            <div class="text-rows">
                <div class="text-row row-italic">*Hello World*</div>
                <div class="text-row row-bold">HELLO WORLD</div>
                <div class="text-row row-inverted">🅗🅔🅛🅛🅞 🅦🅞🅡🅛🅓</div>
                <div class="text-row">🌟 Hello World 🌟</div>
            </div>
            
            <p class="card-footer">☝️ Hover over the text to see the magic!</p>
        </div>
    </main>

</body>
</html>
