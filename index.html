<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стилізатор Тексту</title>
    <!-- Підключаємо шрифт з Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }

        h2 {
            color: #1a202c;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .result-box {
            margin-top: 20px;
            padding: 20px;
            border: 2px solid #6366f1;
            border-radius: 10px;
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: #1a202c;
            word-break: break-all;
        }

        .copy-btn {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .copy-btn:hover {
            background-color: #4f46e5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Стилізатор Тексту</h2>
    
    <!-- Поле введення -->
    <input type="text" id="userInput" placeholder="Введіть текст сюди..." value="Hello World">

    <!-- Вибір шрифту -->
    <select id="fontSelector">
        <option value="'Roboto', sans-serif">Звичайний</option>
        <option value="'Dancing Script', cursive">Рукописний (Script)</option>
        <option value="serif">Класичний (Serif)</option>
        <option value="monospace">Код (Monospace)</option>
    </select>

    <!-- Поле результату -->
    <div class="result-box" id="resultDisplay">Hello World</div>

    <button class="copy-btn" onclick="copyText()">Скопіювати</button>
</div>

<script>
    const userInput = document.getElementById('userInput');
    const fontSelector = document.getElementById('fontSelector');
    const resultDisplay = document.getElementById('resultDisplay');

    // Функція для оновлення результату
    function updateDisplay() {
        resultDisplay.textContent = userInput.value;
        resultDisplay.style.fontFamily = fontSelector.value;
    }

    // Слухаємо зміни в інпуті
    userInput.addEventListener('input', updateDisplay);

    // Слухаємо зміни в селекті (ось тут зазвичай була помилка)
    fontSelector.addEventListener('change', updateDisplay);

    // Функція копіювання
    function copyText() {
        const text = resultDisplay.textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert('Текст скопійовано!');
        });
    }
</script>

</body>
</html>
