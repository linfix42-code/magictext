        body { background-color: #eef9f6; color: #333; padding: 20px; transition: all 0.4s ease; }
        
        .top-ad-space { background: #f2f9f7; border: 1px dashed #b2e2d8; text-align: center; padding: 20px; max-width: 1100px; margin: 0 auto 20px auto; color: #7f8c8d; border-radius: 8px; }
        .ad-sub { font-size: 11px; color: #bdc3c7; margin-top: 4px; }

        .logo-text { font-size: 20px; font-weight: bold; color: #1abc9c; }
        
        .main-container { max-width: 1100px; margin: 0 auto; display: flex; gap: 25px; }
        .sidebar { width: 300px; flex-shrink: 0; }
        .content-area { flex: 1; }
        
        .side-ad-space { background: #f2f9f7; border: 1px dashed #b2e2d8; text-align: center; padding: 60px 20px; color: #7f8c8d; margin-bottom: 20px; border-radius: 12px; }

        .pro-tips-card li { font-size: 13px; color: #566573; margin-bottom: 10px; list-style: none; }
        
        .main-card { background: white; border-radius: 16px; padding: 25px; border: 1px solid #e2f4f0; margin-bottom: 25px; }
        .card-header-title { font-weight: bold; font-size: 18px; margin-bottom: 15px; }
        textarea { width: 100%; height: 120px; border: 2px solid #a3e4d7; border-radius: 12px; padding: 15px; font-size: 16px; resize: none; outline: none; }
        textarea:focus { border-color: #1abc9c; }
        
        .quick-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 15px; }

        .quick-tags span:hover { background: #1abc9c; color: white; }
