<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата Premium - Стилізатор</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .payment-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .crown { font-size: 50px; margin-bottom: 10px; }
        h2 { color: #1a202c; margin-bottom: 20px; }
        .price { font-size: 24px; font-weight: bold; color: #7c3aed; margin-bottom: 20px; }
        .bank-details { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-family: monospace; font-size: 16px; }
        .back-btn { display: inline-block; text-decoration: none; color: #6366f1; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="crown">👑</div>
    <h2>Premium Доступ</h2>
    <p>Отримайте доступ до AI-помічника та ексклюзивних шрифтів</p>
    
    <div class="price">49 UAH / назавжди</div>

    <p>Перекажіть кошти на картку <b>PrivatBank</b>:</p>
    <div class="bank-details">
        #### #### #### #### <!-- Впиши сюди свій номер картки -->
    </div>
    
    <p><small>Після оплати надішліть скріншот у підтримку</small></p>

    <a href="index.html" class="back-btn">← Повернутися назад</a>
</div>

</body>
</html>
